# Runs the full stack with one command: `docker compose up --build`
# Frontend: http://localhost:5173   Backend API docs: http://localhost:8000/docs
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # SQLite inside the container; migrated and seeded on first start.
      DATABASE_URL: sqlite:///./app.db
      BASE_CURRENCY: USD

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
